---
linters:
  enable:
    - gosec
    - govet
    - errcheck
    - noctx
    - bodyclose
    - staticcheck
    - gosimple
    - ineffassign
    - misspell
    - gofmt

linters-settings:
  gosec:
    excludes:
      - G404 # math/rand usage is non-security (random strings, not crypto)

  errcheck:
    check-blank: true

  staticcheck:
    checks:
      - all

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - noctx

  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  tests: true
